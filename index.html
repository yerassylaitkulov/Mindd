<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mind — Second Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ... existing styles remain unchanged ... */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141412;--surface:#1e1c19;--surface2:#252320;
  --border:#2e2b26;--border-light:#252320;
  --ink:#e8e4dc;--muted:#6b6760;--subtle:#3d3a35;
  --gold:#e8a55a;--gold-d:#c8873a;--gold-bg:#2a2015;
  --green:#5aaf7a;--green-bg:#0f2018;
  --red:#e85a5a;--red-bg:#2e0f0f;
  --blue:#5a8fe8;--blue-bg:#0f1a2e;
  --r:8px;--rs:5px;
}
html,body{height:100%;margin:0;padding:0}
body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOP BAR ── */
.topbar{height:48px;background:#0a0a08;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;z-index:999;position:relative}
.brand{font-family:'Instrument Serif',serif;font-size:20px;font-style:italic;color:var(--ink);padding-right:20px;border-right:1px solid var(--border);margin-right:8px}
.nav-tabs{display:flex;gap:2px;flex:1}
.tab{padding:6px 14px;border-radius:var(--rs);font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;border:none;background:none;font-family:'Geist',sans-serif}
.tab:hover{background:var(--surface);color:var(--ink)}
.tab.active{background:var(--surface);color:var(--ink);font-weight:500}

/* ── ... (Other styles) ... ── */

.cal-scroll-area{
  flex:1;
  overflow-x:auto;
  overflow-y:auto;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
  scroll-snap-type:x proximity;
  position:relative;
}
</style>
</head>
<body>

<script>
// ... existing state variables ...
let notes = [], topics = [], allTags = [], kanban = {}, calEvts = {};
let curView = 'notes';

// THE FIX: Adding a Wheel Event Listener for Scroll Navigation
// This piece of code translates mouse wheel movement into week changes.
document.addEventListener('wheel', (e) => {
  // Only execute if the calendar is the active view
  if (curView !== 'calendar') return;
  
  // Only trigger if the mouse is hovering over the calendar scroll area
  const scrollArea = e.target.closest('.cal-scroll-area');
  if (!scrollArea) return;

  // Check if we have reached the edges of the horizontal scroll or if scrolling vertically
  // If e.deltaY > 0, we move forward (+7 days). If e.deltaY < 0, we move backward (-7 days).
  // Added a small threshold to prevent accidental triple-skipping.
  if (Math.abs(e.deltaY) > 20 || Math.abs(e.deltaX) > 20) {
    e.preventDefault(); // Stop the default page/container scroll
    
    // Use your existing changeDate function logic
    if (e.deltaY > 0 || e.deltaX > 0) {
      changeDate(7); // Next week
    } else {
      changeDate(-7); // Prev week
    }
  }
}, { passive: false });

// ── EXISTING CALENDAR LOGIC ──

function renderCal() {
  if (calView === 'month') renderMonth();
  else renderWeek();
}

function changeDate(days) {
  const d = new Date(selDate + 'T12:00:00');
  d.setDate(d.getDate() + days);
  selDate = dkey(d);
  renderCal();
}

// ... (Rest of your existing functions like renderWeek, renderMonth, etc.) ...

// Ensure you call your init functions on load
window.onload = () => {
  // Load data, sync, etc.
  renderCal(); 
};
</script>
</body>
</html>
